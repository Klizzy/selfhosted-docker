services:
    network-check:
        image: alpine:3
        container_name: network-check
        network_mode: host
        command: ["sh", "-c", "tail -f /dev/null"]
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "ping -c 1 -W 2 ${GATEWAY_IP} || exit 1"]
            interval: 5s
            timeout: 3s
            retries: 30
            start_period: 5s

    mosquitto:
        image: eclipse-mosquitto:2
        container_name: mosquitto
        restart: unless-stopped
        ports:
            - "1883:1883"
        volumes:
            - ./mosquitto/confdir:/mosquitto/config
            - ./mosquitto/workdir:/mosquitto/data
        environment:
            - TZ=Europe/Berlin
        healthcheck:
            test: ["CMD-SHELL", "nc -z localhost 1883 || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    zigbee2mqtt:
        image: koenkk/zigbee2mqtt:latest
        entrypoint: ["/bin/sh", "/usr/local/bin/fix-multicast-table.sh"]
        command: ["/sbin/tini", "--", "node", "index.js"]
        container_name: zigbee2mqtt
        restart: unless-stopped
        depends_on:
            mosquitto:
                condition: service_healthy
        ports:
            - "8080:8080"
        volumes:
            - ./zigbee2mqtt/confdir:/app/data
            - /run/udev:/run/udev:ro
            - ./zigbee2mqtt/patches/fix-multicast-table.sh:/usr/local/bin/fix-multicast-table.sh:ro
        devices:
            - ${ZIGBEE_DEVICE}:/dev/ttyACM0
        environment:
            - TZ=Europe/Berlin
        group_add:
            - dialout
        healthcheck:
            test: ["CMD-SHELL", "wget -q --spider http://localhost:8080 || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    homeassistant:
        image: ghcr.io/home-assistant/home-assistant:stable
        container_name: homeassistant
        restart: unless-stopped
        depends_on:
            mosquitto:
                condition: service_healthy
            network-check:
                condition: service_healthy
        network_mode: host
        privileged: true
        volumes:
            - ./homeassistant/confdir:/config
            - /etc/localtime:/etc/localtime:ro
        environment:
            - TZ=Europe/Berlin
